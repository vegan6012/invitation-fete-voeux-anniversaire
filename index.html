<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 ans d'amour, 30 ans de vie</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            background: #FAFAFA;
            overflow-x: hidden;
        }

        /* ============================================
           CONFETTIS ANIMÉS (fond)
           ============================================ */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0.15;
            animation: confetti-fall linear infinite;
        }

        .confetti:nth-child(odd) { border-radius: 50%; }
        .confetti:nth-child(even) { border-radius: 2px; transform: rotate(45deg); }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        nav ul {
            display: flex;
            justify-content: center;
            gap: 30px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #C9A87C;
        }

        /* ============================================
           HERO
           ============================================ */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px 40px;
            position: relative;
            z-index: 1;
        }

        #hero-sous-titre {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        #hero-titre {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #C9A87C, #E8B4C8, #7EB8C9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Cartes couple + anniversaire */
        .hero-cards {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hero-card {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            min-width: 250px;
            transition: transform 0.3s;
        }

        .hero-card:hover {
            transform: translateY(-5px);
        }

        .hero-card.voeux {
            border-top: 4px solid #C9A87C;
        }

        .hero-card.anniv {
            border-top: 4px solid #E8B4C8;
        }

        .hero-card .icone {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .hero-card .label {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-card .noms {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 5px 0;
        }

        .hero-card .detail {
            font-size: 0.95rem;
            color: #777;
        }

        /* Date et lieu */
        #hero-date-lieu {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .countdown-item {
            text-align: center;
        }

        .countdown-item .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #C9A87C;
        }

        .countdown-item .unit {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ============================================
           SECTIONS COMMUNES
           ============================================ */
        section {
            position: relative;
            z-index: 1;
            padding: 80px 20px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
        }

        /* ============================================
           PROGRAMME (section principale)
           ============================================ */
        #programme {
            background: white;
        }

        .programme-legende {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .legende-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #777;
        }

        .legende-pastille {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .legende-pastille.voeux { background: #C9A87C; }
        .legende-pastille.anniversaire { background: #E8B4C8; }
        .legende-pastille.commun { background: #7EB8C9; }

        .programme-grid {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .programme-item {
            display: flex;
            gap: 20px;
            padding: 25px 0;
            border-bottom: 1px solid #f0f0f0;
            align-items: flex-start;
            transition: transform 0.3s;
        }

        .programme-item:hover {
            transform: translateX(10px);
        }

        .programme-item:last-child {
            border-bottom: none;
        }

        .programme-heure {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 80px;
            color: #333;
        }

        .programme-barre {
            width: 4px;
            min-height: 60px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .programme-barre.voeux { background: #C9A87C; }
        .programme-barre.anniversaire { background: #E8B4C8; }
        .programme-barre.commun { background: #7EB8C9; }

        .programme-contenu {
            flex: 1;
        }

        .programme-icone {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .programme-titre {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .programme-desc {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        /* ============================================
           LIEU
           ============================================ */
        #lieu {
            background: #FAFAFA;
            text-align: center;
        }

        .lieu-card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        .lieu-card .lieu-icone {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        #lieu-nom {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        #lieu-adresse {
            color: #888;
            margin-bottom: 5px;
        }

        #lieu-indication {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .btn-maps {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #7EB8C9, #6BA8B9);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-maps:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(126, 184, 201, 0.4);
        }

        /* ============================================
           INFOS PRATIQUES
           ============================================ */
        #infos {
            background: white;
        }

        .infos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        .info-card {
            background: #FAFAFA;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
        }

        .info-card .info-icone {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .info-card .info-titre {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .info-card .info-texte {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #333;
            color: white;
            position: relative;
            z-index: 1;
        }

        #footer-noms {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        #footer-annee {
            color: #999;
            font-size: 0.85rem;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 600px) {
            nav ul {
                gap: 15px;
                font-size: 0.8rem;
            }

            .hero-cards {
                flex-direction: column;
                align-items: center;
            }

            .hero-card {
                min-width: 80%;
            }

            .countdown {
                gap: 12px;
            }

            .countdown-item .number {
                font-size: 1.8rem;
            }

            .programme-item {
                gap: 12px;
            }

            .programme-heure {
                font-size: 1rem;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
         CONFETTIS (décoration de fond)
         ========================================== -->
    <div class="confetti-container" id="confetti-container"></div>

    <!-- ==========================================
         NAVIGATION
         ========================================== -->
    <nav>
        <ul>
            <li><a href="#programme">Programme</a></li>
            <li><a href="#lieu">Lieu</a></li>
            <li><a href="#infos">Infos</a></li>
        </ul>
    </nav>

    <!-- ==========================================
         HERO
         ========================================== -->
    <section id="hero">
        <p id="hero-sous-titre"></p>
        <h1 id="hero-titre"></h1>

        <div class="hero-cards">
            <div class="hero-card voeux">
                <div class="icone">💍</div>
                <div class="label" id="card-voeux-label"></div>
                <div class="noms" id="card-voeux-noms"></div>
                <div class="detail" id="card-voeux-detail"></div>
            </div>
            <div class="hero-card anniv">
                <div class="icone">🎂</div>
                <div class="label" id="card-anniv-label"></div>
                <div class="noms" id="card-anniv-nom"></div>
                <div class="detail" id="card-anniv-detail"></div>
            </div>
        </div>

        <p id="hero-date-lieu"></p>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <div class="number" id="cd-jours">--</div>
                <div class="unit">jours</div>
            </div>
            <div class="countdown-item">
                <div class="number" id="cd-heures">--</div>
                <div class="unit">heures</div>
            </div>
            <div class="countdown-item">
                <div class="number" id="cd-minutes">--</div>
                <div class="unit">minutes</div>
            </div>
            <div class="countdown-item">
                <div class="number" id="cd-secondes">--</div>
                <div class="unit">secondes</div>
            </div>
        </div>
    </section>

    <!-- ==========================================
         PROGRAMME
         ========================================== -->
    <section id="programme">
        <h2 class="section-title">Programme de la journée</h2>
        <div class="programme-legende">
            <div class="legende-item">
                <div class="legende-pastille voeux"></div>
                <span>Renouvellement de vœux</span>
            </div>
            <div class="legende-item">
                <div class="legende-pastille anniversaire"></div>
                <span>Anniversaire</span>
            </div>
            <div class="legende-item">
                <div class="legende-pastille commun"></div>
                <span>Tous ensemble</span>
            </div>
        </div>
        <div class="programme-grid" id="programme-grid">
            <!-- Rempli dynamiquement par JS -->
        </div>
    </section>

    <!-- ==========================================
         LIEU
         ========================================== -->
    <section id="lieu">
        <h2 class="section-title">Le lieu</h2>
        <div class="lieu-card">
            <div class="lieu-icone">📍</div>
            <h3 id="lieu-nom"></h3>
            <p id="lieu-adresse"></p>
            <p id="lieu-indication"></p>
            <a id="lieu-maps-link" class="btn-maps" href="#" target="_blank">Ouvrir dans Google Maps</a>
        </div>
    </section>

    <!-- ==========================================
         INFOS PRATIQUES
         ========================================== -->
    <section id="infos">
        <h2 class="section-title">Infos pratiques</h2>
        <div class="infos-grid" id="infos-grid">
            <!-- Rempli dynamiquement par JS -->
        </div>
    </section>

    <!-- ==========================================
         FOOTER
         ========================================== -->
    <footer>
        <p id="footer-noms"></p>
        <p id="footer-annee"></p>
    </footer>

    <!-- ==========================================
         JAVASCRIPT
         ========================================== -->
    <script>
        /* ==============================================
           DONNÉES DE L'ÉVÉNEMENT
           ==============================================
           *** MODIFIEZ ICI pour personnaliser le site ***
           Toutes les données sont dans cet objet DATA.
           Changez les valeurs, sauvegardez, rechargez.
           ============================================== */
        const DATA = {
            hero: {
                titre: "30 ans d'amour,\n30 ans de vie",
                sousTitre: "Et on fête ça ensemble !",
                dateEvenement: "2026-07-12T15:00:00",
                lieuCourt: "Domaine de la Roseraie"
            },
            couple: {
                prenom1: "Nathalie",
                prenom2: "Philippe",
                label: "Renouvellement de vœux",
                detail: "30 ans de mariage",
                dateMariage: "12 juillet 1996"
            },
            anniversaire: {
                prenom: "Léa",
                label: "Joyeux anniversaire",
                detail: "30 ans",
                dateNaissance: "3 septembre 1996"
            },
            programme: [
                {
                    heure: "15h00",
                    titre: "Cérémonie de renouvellement de vœux",
                    description: "Nathalie & Philippe se redisent oui, 30 ans après.",
                    type: "voeux",
                    icone: "💍"
                },
                {
                    heure: "16h00",
                    titre: "Vin d'honneur & cocktail",
                    description: "Champagne, petits fours et retrouvailles.",
                    type: "commun",
                    icone: "🥂"
                },
                {
                    heure: "17h30",
                    titre: "Jeux & animations",
                    description: "Quiz sur les 30 ans du couple et les 30 ans de Léa.",
                    type: "commun",
                    icone: "🎲"
                },
                {
                    heure: "19h30",
                    titre: "Dîner",
                    description: "Repas gastronomique tous ensemble.",
                    type: "commun",
                    icone: "🍽️"
                },
                {
                    heure: "21h00",
                    titre: "Gâteau & soufflage de bougies",
                    description: "30 bougies pour Léa, et une pièce montée pour le couple !",
                    type: "anniversaire",
                    icone: "🎂"
                },
                {
                    heure: "22h00",
                    titre: "Soirée dansante",
                    description: "DJ, piste de danse et photobooth.",
                    type: "commun",
                    icone: "💃"
                }
            ],
            lieu: {
                nom: "Domaine de la Roseraie",
                adresse: "1234 Chemin des Roses, 69380 Lissieu",
                lienMaps: "https://maps.google.com/?q=Domaine+de+la+Roseraie+Lissieu",
                indication: "Parking gratuit sur place. Fléchage depuis la sortie d'autoroute."
            },
            infos: [
                {
                    icone: "👗",
                    titre: "Dress code",
                    texte: "Tenue de fête — soyez beaux, soyez vous !"
                },
                {
                    icone: "👶",
                    titre: "Enfants",
                    texte: "Les enfants sont les bienvenus. Espace jeux prévu."
                },
                {
                    icone: "🎁",
                    titre: "Cadeaux",
                    texte: "Votre présence est le plus beau des cadeaux. Si vous insistez, une cagnotte sera disponible sur place."
                },
                {
                    icone: "📞",
                    titre: "Contact",
                    texte: "Léa : 06 12 34 56 78 — lea@email.com"
                }
            ]
        };

        /* ==============================================
           INJECTION DES DONNÉES DANS LA PAGE
           ============================================== */

        // --- Hero ---
        document.getElementById('hero-titre').textContent = DATA.hero.titre;
        document.getElementById('hero-sous-titre').textContent = DATA.hero.sousTitre;

        // --- Cartes ---
        document.getElementById('card-voeux-label').textContent = DATA.couple.label;
        document.getElementById('card-voeux-noms').textContent = DATA.couple.prenom1 + " & " + DATA.couple.prenom2;
        document.getElementById('card-voeux-detail').textContent = DATA.couple.detail;

        document.getElementById('card-anniv-label').textContent = DATA.anniversaire.label;
        document.getElementById('card-anniv-nom').textContent = DATA.anniversaire.prenom;
        document.getElementById('card-anniv-detail').textContent = DATA.anniversaire.detail;

        // --- Date et lieu ---
        var dateObj = new Date(DATA.hero.dateEvenement);
        var options = { day: 'numeric', month: 'long', year: 'numeric' };
        var dateFormatee = dateObj.toLocaleDateString('fr-FR', options);
        document.getElementById('hero-date-lieu').textContent = dateFormatee + " · " + DATA.hero.lieuCourt;

        // --- Programme ---
        var progGrid = document.getElementById('programme-grid');
        DATA.programme.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'programme-item';
            div.innerHTML =
                '<div class="programme-heure">' + item.heure + '</div>' +
                '<div class="programme-barre ' + item.type + '"></div>' +
                '<div class="programme-contenu">' +
                    '<div class="programme-icone">' + item.icone + '</div>' +
                    '<div class="programme-titre">' + item.titre + '</div>' +
                    '<div class="programme-desc">' + item.description + '</div>' +
                '</div>';
            progGrid.appendChild(div);
        });

        // --- Lieu ---
        document.getElementById('lieu-nom').textContent = DATA.lieu.nom;
        document.getElementById('lieu-adresse').textContent = DATA.lieu.adresse;
        document.getElementById('lieu-indication').textContent = DATA.lieu.indication;
        document.getElementById('lieu-maps-link').href = DATA.lieu.lienMaps;

        // --- Infos pratiques ---
        var infosGrid = document.getElementById('infos-grid');
        DATA.infos.forEach(function(info) {
            var div = document.createElement('div');
            div.className = 'info-card';
            div.innerHTML =
                '<div class="info-icone">' + info.icone + '</div>' +
                '<div class="info-titre">' + info.titre + '</div>' +
                '<div class="info-texte">' + info.texte + '</div>';
            infosGrid.appendChild(div);
        });

        // --- Footer ---
        document.getElementById('footer-noms').textContent =
            DATA.couple.prenom1 + " & " + DATA.couple.prenom2 + " · " + DATA.anniversaire.prenom;
        document.getElementById('footer-annee').textContent = "2026";

        /* ==============================================
           COUNTDOWN (compte à rebours)
           ============================================== */
        function updateCountdown() {
            var now = new Date().getTime();
            var target = new Date(DATA.hero.dateEvenement).getTime();
            var diff = target - now;

            if (diff <= 0) {
                document.getElementById('cd-jours').textContent = "🎉";
                document.getElementById('cd-heures').textContent = "";
                document.getElementById('cd-minutes').textContent = "";
                document.getElementById('cd-secondes').textContent = "";
                return;
            }

            var jours = Math.floor(diff / (1000 * 60 * 60 * 24));
            var heures = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            var secondes = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('cd-jours').textContent = jours;
            document.getElementById('cd-heures').textContent = heures < 10 ? "0" + heures : heures;
            document.getElementById('cd-minutes').textContent = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById('cd-secondes').textContent = secondes < 10 ? "0" + secondes : secondes;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        /* ==============================================
           CONFETTIS (animation décorative)
           ============================================== */
        var confettiColors = ['#C9A87C', '#E8B4C8', '#7EB8C9', '#B8D4A3', '#F0C987', '#D4A5C9'];
        var container = document.getElementById('confetti-container');

        for (var i = 0; i < 30; i++) {
            var confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
            confetti.style.animationDuration = (Math.random() * 10 + 8) + 's';
            confetti.style.animationDelay = (Math.random() * 10) + 's';
            confetti.style.width = (Math.random() * 8 + 6) + 'px';
            confetti.style.height = confetti.style.width;
            container.appendChild(confetti);
        }
    </script>

</body>
</html>
