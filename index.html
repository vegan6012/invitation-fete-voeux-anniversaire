<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Le titre et la description sont injectés depuis data.json -->
    <title>Chargement...</title>
    <meta name="description" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           CSS COMPLET — Design joyeux & dynamique
           ============================================================ */

        /* --- RESET & BASE --- */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #D4A843;
            --gold-light: #FDF6E3;
            --pink: #E8637A;
            --pink-light: #FFF0F3;
            --green: #5BAD6F;
            --green-light: #EEFAF1;
            --dark: #2D2A26;
            --gray: #6B6560;
            --light: #FAFAF8;
            --white: #FFFFFF;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background: var(--light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- CONFETTIS ANIMÉS EN FOND --- */
        .confetti-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px; height: 10px;
            opacity: 0.25;
            animation: confetti-fall linear infinite;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.2; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            padding: 0 2rem;
            display: flex; align-items: center; justify-content: center;
            height: 60px;
        }

        nav a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 99px;
            transition: all 0.3s;
        }

        nav a:hover {
            color: var(--dark);
            background: var(--gold-light);
        }

        /* --- HERO --- */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 1.5rem 3rem;
            position: relative;
            z-index: 1;
        }

        #hero-surtitre {
            font-size: 1.1rem;
            color: var(--gray);
            margin-bottom: 0.5rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.5rem, 7vw, 5rem);
            line-height: 1.1;
            margin-bottom: 2.5rem;
        }

        .hero-title .line1 { color: var(--gold); display: block; }
        .hero-title .line2 { color: var(--pink); display: block; }

        /* Cartes Hero */
        .hero-cards {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hero-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem 2.5rem;
            box-shadow: var(--shadow);
            min-width: 220px;
            transition: transform 0.3s;
            border-top: 4px solid transparent;
        }

        .hero-card:hover { transform: translateY(-6px); }
        .hero-card.voeux { border-top-color: var(--gold); }
        .hero-card.anniv { border-top-color: var(--pink); }

        .hero-card .card-emoji { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .hero-card .card-label { font-size: 0.85rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; }
        .hero-card .card-noms { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; margin: 0.3rem 0; }
        .hero-card .card-detail { color: var(--gray); font-size: 0.95rem; }

        .hero-separator {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold);
            align-self: center;
        }

        /* Date & Lieu sous hero */
        #hero-date-lieu {
            font-size: 1.15rem;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .countdown-item {
            background: var(--white);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            min-width: 80px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .countdown-item .count-number {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--gold);
            display: block;
        }

        .countdown-item .count-label {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* --- SECTIONS GÉNÉRIQUES --- */
        section {
            position: relative;
            z-index: 1;
            padding: 5rem 1.5rem;
        }

        .section-container {
            max-width: 960px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: var(--gray);
            font-size: 1.1rem;
        }

        /* --- PROGRAMME (section principale) --- */
        #programme {
            background: var(--white);
        }

        .programme-grid {
            display: grid;
            gap: 1.5rem;
        }

        .moment-card {
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            background: var(--light);
            border-radius: var(--radius);
            padding: 1.8rem 2rem;
            border-left: 5px solid transparent;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .moment-card:hover {
            transform: translateX(6px);
            box-shadow: var(--shadow);
        }

        .moment-card.type-voeux { border-left-color: var(--gold); background: var(--gold-light); }
        .moment-card.type-anniversaire { border-left-color: var(--pink); background: var(--pink-light); }
        .moment-card.type-commun { border-left-color: var(--green); background: var(--green-light); }

        .moment-heure {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 65px;
            color: var(--dark);
        }

        .moment-icone {
            font-size: 2rem;
            min-width: 40px;
            text-align: center;
        }

        .moment-contenu { flex: 1; }

        .moment-contenu h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .moment-contenu p {
            color: var(--gray);
            font-size: 0.95rem;
        }

        .moment-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.2rem 0.7rem;
            border-radius: 99px;
            margin-top: 0.5rem;
        }

        .type-voeux .moment-badge { background: var(--gold); color: white; }
        .type-anniversaire .moment-badge { background: var(--pink); color: white; }
        .type-commun .moment-badge { background: var(--green); color: white; }

        /* Légende du programme */
        .programme-legende {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2.5rem;
            flex-wrap: wrap;
        }

        .legende-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .legende-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
        }

        .legende-dot.dot-voeux { background: var(--gold); }
        .legende-dot.dot-anniv { background: var(--pink); }
        .legende-dot.dot-commun { background: var(--green); }

        /* --- LIEU --- */
        #lieu { background: var(--light); }

        .lieu-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 3rem;
            text-align: center;
            box-shadow: var(--shadow);
            max-width: 600px;
            margin: 0 auto;
        }

        .lieu-card .lieu-icone { font-size: 3rem; margin-bottom: 1rem; }

        .lieu-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
        }

        .lieu-card .lieu-adresse { color: var(--gray); margin-bottom: 0.3rem; }
        .lieu-card .lieu-indication { color: var(--gray); font-size: 0.9rem; margin-bottom: 1.5rem; }

        .btn-maps {
            display: inline-block;
            background: var(--gold);
            color: white;
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-maps:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(212,168,67,0.4);
        }

        /* --- INFOS PRATIQUES --- */
        #infos { background: var(--white); }

        .infos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .info-card {
            background: var(--light);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            transition: transform 0.3s;
        }

        .info-card:hover { transform: translateY(-4px); }
        .info-card .info-icone { font-size: 2.5rem; margin-bottom: 0.8rem; }

        .info-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .info-card p {
            color: var(--gray);
            font-size: 0.9rem;
        }

        /* --- FOOTER --- */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 1.5rem;
            background: var(--dark);
            color: rgba(255,255,255,0.5);
        }

        footer .footer-noms {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        /* --- ANIMATIONS AU SCROLL --- */
        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 640px) {
            .hero-cards { flex-direction: column; align-items: center; }
            .hero-separator { display: none; }
            .moment-card { flex-direction: column; gap: 0.8rem; }
            .moment-heure { min-width: auto; }
            nav { padding: 0 0.5rem; }
            nav a { font-size: 0.78rem; padding: 0.4rem 0.7rem; }
            .lieu-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <!-- ===== CONFETTIS (générés par JS) ===== -->
    <div class="confetti-container" id="confetti-container"></div>

    <!-- ===== NAVIGATION ===== -->
    <nav id="nav">
        <!-- Les liens sont générés par JS depuis les sections -->
        <a href="#programme">Programme</a>
        <a href="#lieu">Lieu</a>
        <a href="#infos">Infos</a>
    </nav>

    <!-- ===== HERO ===== -->
    <section id="hero">
        <p id="hero-surtitre"></p>
        <h1 class="hero-title">
            <span class="line1" id="hero-titre-1"></span>
            <span class="line2" id="hero-titre-2"></span>
        </h1>
        <div class="hero-cards" id="hero-cards">
            <!-- Cartes injectées par JS -->
        </div>
        <p id="hero-date-lieu"></p>
        <div class="countdown" id="countdown">
            <!-- Countdown injecté par JS -->
        </div>
    </section>

    <!-- ===== PROGRAMME ===== -->
    <section id="programme">
        <div class="section-container">
            <div class="section-header fade-up">
                <h2 id="programme-titre"></h2>
                <p id="programme-sous-titre"></p>
            </div>
            <div class="programme-grid" id="programme-grid">
                <!-- Moments injectés par JS -->
            </div>
            <div class="programme-legende" id="programme-legende">
                <!-- Légende injectée par JS -->
            </div>
        </div>
    </section>

    <!-- ===== LIEU ===== -->
    <section id="lieu">
        <div class="section-container">
            <div class="section-header fade-up">
                <h2 id="lieu-titre"></h2>
            </div>
            <div class="lieu-card fade-up" id="lieu-card">
                <!-- Contenu injecté par JS -->
            </div>
        </div>
    </section>

    <!-- ===== INFOS PRATIQUES ===== -->
    <section id="infos">
        <div class="section-container">
            <div class="section-header fade-up">
                <h2 id="infos-titre"></h2>
            </div>
            <div class="infos-grid" id="infos-grid">
                <!-- Cartes injectées par JS -->
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p class="footer-noms" id="footer-noms"></p>
        <p id="footer-annee"></p>
    </footer>

    <!-- ============================================================
         JAVASCRIPT — Charge data.json et injecte TOUT le contenu
         ============================================================ -->
    <script>
    (async function() {

        // ---- 1. CHARGER data.json ----
        let data;
        try {
            const response = await fetch('data.json');
            data = await response.json();
        } catch (e) {
            document.body.innerHTML = '<p style="text-align:center;padding:4rem;font-size:1.2rem;">Erreur : impossible de charger <strong>data.json</strong>. Vérifiez que le fichier est bien dans le même dossier que index.html.</p>';
            return;
        }

        // ---- 2. META ----
        document.title = data.meta.titre_page;
        document.querySelector('meta[name="description"]').content = data.meta.description;

        // ---- 3. HERO ----
        document.getElementById('hero-surtitre').textContent = data.hero.surtitre;
        document.getElementById('hero-titre-1').textContent = data.hero.titre_ligne1;
        document.getElementById('hero-titre-2').textContent = data.hero.titre_ligne2;

        const heroCardsHTML = `
            <div class="hero-card voeux">
                <div class="card-emoji">${data.hero.carte_mariage.emoji}</div>
                <div class="card-label">${data.hero.carte_mariage.label}</div>
                <div class="card-noms">${data.hero.carte_mariage.noms}</div>
                <div class="card-detail">${data.hero.carte_mariage.detail}</div>
            </div>
            <div class="hero-separator">&</div>
            <div class="hero-card anniv">
                <div class="card-emoji">${data.hero.carte_anniversaire.emoji}</div>
                <div class="card-label">${data.hero.carte_anniversaire.label}</div>
                <div class="card-noms">${data.hero.carte_anniversaire.noms}</div>
                <div class="card-detail">${data.hero.carte_anniversaire.detail}</div>
            </div>
        `;
        document.getElementById('hero-cards').innerHTML = heroCardsHTML;

        document.getElementById('hero-date-lieu').textContent =
            data.evenement.date_affichee + ' · ' + data.evenement.lieu_court;

        // ---- 4. COUNTDOWN ----
        function updateCountdown() {
            const now = new Date();
            const target = new Date(data.evenement.date_iso);
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('countdown').innerHTML = '<p style="font-size:1.3rem;color:var(--gold);">C\'est aujourd\'hui ! 🎉</p>';
                return;
            }

            const jours = Math.floor(diff / (1000 * 60 * 60 * 24));
            const heures = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secondes = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = `
                <div class="countdown-item"><span class="count-number">${jours}</span><span class="count-label">jours</span></div>
                <div class="countdown-item"><span class="count-number">${String(heures).padStart(2,'0')}</span><span class="count-label">heures</span></div>
                <div class="countdown-item"><span class="count-number">${String(minutes).padStart(2,'0')}</span><span class="count-label">minutes</span></div>
                <div class="countdown-item"><span class="count-number">${String(secondes).padStart(2,'0')}</span><span class="count-label">secondes</span></div>
            `;
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ---- 5. PROGRAMME ----
        document.getElementById('programme-titre').textContent = data.programme.titre;
        document.getElementById('programme-sous-titre').textContent = data.programme.sous_titre;

        const typeLabels = { voeux: 'Renouvellement', anniversaire: 'Anniversaire', commun: 'Tous ensemble' };

        const momentsHTML = data.programme.moments.map((m, i) => `
            <div class="moment-card type-${m.type} fade-up" style="transition-delay: ${i * 0.1}s">
                <div class="moment-heure">${m.heure}</div>
                <div class="moment-icone">${m.icone}</div>
                <div class="moment-contenu">
                    <h3>${m.titre}</h3>
                    <p>${m.description}</p>
                    <span class="moment-badge">${typeLabels[m.type] || m.type}</span>
                </div>
            </div>
        `).join('');
        document.getElementById('programme-grid').innerHTML = momentsHTML;

        document.getElementById('programme-legende').innerHTML = `
            <div class="legende-item"><span class="legende-dot dot-voeux"></span> Renouvellement de vœux</div>
            <div class="legende-item"><span class="legende-dot dot-anniv"></span> Anniversaire</div>
            <div class="legende-item"><span class="legende-dot dot-commun"></span> Tous ensemble</div>
        `;

        // ---- 6. LIEU ----
        document.getElementById('lieu-titre').textContent = data.lieu.titre;
        document.getElementById('lieu-card').innerHTML = `
            <div class="lieu-icone">📍</div>
            <h3>${data.lieu.nom}</h3>
            <p class="lieu-adresse">${data.lieu.adresse}</p>
            <p class="lieu-indication">${data.lieu.indication}</p>
            <a href="${data.lieu.lien_maps}" target="_blank" rel="noopener" class="btn-maps">${data.lieu.texte_bouton}</a>
        `;

        // ---- 7. INFOS PRATIQUES ----
        document.getElementById('infos-titre').textContent = data.infos.titre;
        const infosHTML = data.infos.cartes.map((c, i) => `
            <div class="info-card fade-up" style="transition-delay: ${i * 0.1}s">
                <div class="info-icone">${c.icone}</div>
                <h3>${c.titre}</h3>
                <p>${c.texte}</p>
            </div>
        `).join('');
        document.getElementById('infos-grid').innerHTML = infosHTML;

        // ---- 8. FOOTER ----
        document.getElementById('footer-noms').textContent = data.footer.texte;
        document.getElementById('footer-annee').textContent = data.footer.annee;

        // ---- 9. CONFETTIS ----
        const confettiContainer = document.getElementById('confetti-container');
        const colors = ['#D4A843', '#E8637A', '#5BAD6F', '#F4C542', '#A78BFA', '#60B5F6'];
        const shapes = ['circle', 'square'];

        for (let i = 0; i < 40; i++) {
            const el = document.createElement('div');
            el.classList.add('confetti');
            const color = colors[Math.floor(Math.random() * colors.length)];
            const size = Math.random() * 8 + 5;
            const left = Math.random() * 100;
            const delay = Math.random() * 15;
            const duration = Math.random() * 10 + 10;
            const shape = shapes[Math.floor(Math.random() * shapes.length)];

            el.style.cssText = `
                left: ${left}%;
                width: ${size}px;
                height: ${size}px;
                background: ${color};
                border-radius: ${shape === 'circle' ? '50%' : '2px'};
                animation-delay: ${delay}s;
                animation-duration: ${duration}s;
            `;
            confettiContainer.appendChild(el);
        }

        // ---- 10. ANIMATIONS AU SCROLL ----
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));

    })();
    </script>

</body>
</html>
