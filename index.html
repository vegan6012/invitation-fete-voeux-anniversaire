<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30 ans d'amour, 30 ans de vie</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            background: #FAFAFA;
            overflow-x: hidden;
        }

        /* ============================================
           CONFETTIS ANIMÉS (fond)
           ============================================ */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0.15;
            animation: confetti-fall linear infinite;
        }

        .confetti:nth-child(odd) { border-radius: 50%; }
        .confetti:nth-child(even) { border-radius: 2px; transform: rotate(45deg); }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(720deg); }
        }

        /* ============================================
           NAVIGATION
           ============================================ */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        nav ul {
            display: flex;
            justify-content: center;
            gap: 30px;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: #555;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #C9A87C;
        }

        /* ============================================
           HERO
           ============================================ */
        #hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px 40px;
            position: relative;
            z-index: 1;
        }

        #hero-sous-titre {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
        }

        #hero-titre {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #C9A87C, #E8B4C8, #7EB8C9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Mention discrète des rôles */
        #hero-roles {
            font-size: 0.85rem;
            color: #bbb;
            font-style: italic;
            margin-bottom: 40px;
            letter-spacing: 0.5px;
        }

        /* Cartes couple + anniversaire */
        .hero-cards {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .hero-card {
            background: white;
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            min-width: 250px;
            transition: transform 0.3s;
        }

        .hero-card:hover {
            transform: translateY(-5px);
        }

        .hero-card.voeux {
            border-top: 4px solid #C9A87C;
        }

        .hero-card.anniv {
            border-top: 4px solid #E8B4C8;
        }

        .hero-card .icone {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .hero-card .label {
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-card .noms {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin: 5px 0;
        }

        .hero-card .detail {
            font-size: 0.95rem;
            color: #777;
        }

        /* Date et lieu */
        #hero-date-lieu {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* Countdown */
        .countdown {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .countdown-item {
            text-align: center;
        }

        .countdown-item .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: #C9A87C;
        }

        .countdown-item .unit {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ============================================
           SECTIONS COMMUNES
           ============================================ */
        section {
            position: relative;
            z-index: 1;
            padding: 80px 20px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
        }

        /* ============================================
           BIENVENUE / VENEZ COMME VOUS VOULEZ
           ============================================ */
        #bienvenue {
            background: #FAFAFA;
            padding: 80px 20px;
        }

        .bienvenue-wrapper {
            max-width: 750px;
            margin: 0 auto;
        }

        .bienvenue-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .bienvenue-header .bienvenue-icone {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .bienvenue-header .bienvenue-titre {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #333;
        }

        .bienvenue-texte {
            font-size: 1.05rem;
            color: #666;
            line-height: 1.8;
            text-align: center;
            margin-bottom: 35px;
        }

        /* Encart dîner — style carte distincte */
        .bienvenue-encart {
            background: white;
            border-radius: 16px;
            padding: 30px 35px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.06);
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .bienvenue-encart-icone {
            font-size: 2.2rem;
            flex-shrink: 0;
            line-height: 1;
            margin-top: 2px;
        }

        .bienvenue-encart-contenu {
            flex: 1;
        }

        .bienvenue-encart-titre {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #C9A87C;
            margin-bottom: 8px;
        }

        .bienvenue-encart-texte {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.7;
        }

        /* ============================================
           PROGRAMME (section principale)
           ============================================ */
        #programme {
            background: white;
        }

        .programme-legende {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .legende-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #777;
        }

        .legende-pastille {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        .legende-pastille.voeux { background: #C9A87C; }
        .legende-pastille.anniversaire { background: #E8B4C8; }
        .legende-pastille.commun { background: #7EB8C9; }

        .programme-grid {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .programme-item {
            display: flex;
            gap: 20px;
            padding: 25px 0;
            border-bottom: 1px solid #f0f0f0;
            align-items: flex-start;
            transition: transform 0.3s;
        }

        .programme-item:hover {
            transform: translateX(10px);
        }

        .programme-item:last-child {
            border-bottom: none;
        }

        .programme-heure {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            min-width: 80px;
            color: #333;
        }

        .programme-barre {
            width: 4px;
            min-height: 60px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .programme-barre.voeux { background: #C9A87C; }
        .programme-barre.anniversaire { background: #E8B4C8; }
        .programme-barre.commun { background: #7EB8C9; }

        .programme-contenu {
            flex: 1;
        }

        .programme-icone {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .programme-titre {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .programme-desc {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        /* ============================================
           LIEU
           ============================================ */
        #lieu {
            background: #FAFAFA;
            text-align: center;
        }

        .lieu-card {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
        }

        .lieu-card .lieu-icone {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        #lieu-nom {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        #lieu-adresse {
            color: #888;
            margin-bottom: 5px;
        }

        #lieu-indication {
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .btn-maps {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #7EB8C9, #6BA8B9);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn-maps:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(126, 184, 201, 0.4);
        }

        /* ============================================
           HÉBERGEMENT
           ============================================ */
        #hebergement {
            background: white;
        }

        .hebergement-intro {
            max-width: 700px;
            margin: 0 auto 40px;
            text-align: center;
            font-size: 1rem;
            color: #666;
            line-height: 1.7;
        }

        .hebergement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        .hebergement-card {
            background: #FAFAFA;
            border-radius: 16px;
            padding: 30px;
            border-left: 4px solid #7EB8C9;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .hebergement-card:hover {
            transform: translateY(-5px);
        }

        .hebergement-card .heberg-icone {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .hebergement-card .heberg-nom {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 10px;
        }

        .hebergement-card .heberg-desc {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 15px;
            flex: 1;
        }

        .hebergement-card .heberg-prix {
            font-size: 0.85rem;
            color: #C9A87C;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .heberg-link {
            display: inline-block;
            padding: 8px 20px;
            background: #7EB8C9;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;
            align-self: flex-start;
        }

        .heberg-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(126, 184, 201, 0.4);
        }

        .heberg-link-placeholder {
            height: 35px;
        }

        /* ============================================
           RSVP / PRÉVENIR
           ============================================ */
        #rsvp {
            background: #FAFAFA;
            text-align: center;
        }

        .rsvp-box {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border-top: 4px solid #E8B4C8;
        }

        .rsvp-box .rsvp-icone {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .rsvp-box .rsvp-titre {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .rsvp-box .rsvp-date-limite {
            font-size: 1.1rem;
            color: #C9A87C;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .rsvp-box .rsvp-texte {
            font-size: 1rem;
            color: #666;
            line-height: 1.7;
        }

        /* ============================================
           INFOS PRATIQUES
           ============================================ */
        #infos {
            background: white;
        }

        .infos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            max-width: 900px;
            margin: 0 auto;
        }

        .info-card {
            background: #FAFAFA;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s;
        }

        .info-card:hover {
            transform: translateY(-5px);
        }

        .info-card .info-icone {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .info-card .info-titre {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 8px;
        }

        .info-card .info-texte {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        /* ============================================
           FOOTER
           ============================================ */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #333;
            color: white;
            position: relative;
            z-index: 1;
        }

        #footer-noms {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        #footer-annee {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .footer-contacts {
            font-size: 0.85rem;
            color: #aaa;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            section {
                padding: 60px 16px;
            }

            .section-title {
                font-size: 2rem;
                margin-bottom: 35px;
            }

            nav ul {
                gap: 12px;
                padding: 0 10px;
            }

            nav a {
                font-size: 0.78rem;
            }

            #hero {
                padding: 70px 16px 30px;
            }

            #hero-titre {
                font-size: clamp(2rem, 8vw, 3rem);
                margin-bottom: 10px;
            }

            #hero-roles {
                font-size: 0.78rem;
                margin-bottom: 30px;
            }

            #hero-sous-titre {
                font-size: 0.95rem;
                margin-bottom: 35px;
            }

            .hero-cards {
                flex-direction: column;
                align-items: center;
                gap: 15px;
                margin-bottom: 30px;
            }

            .hero-card {
                min-width: unset;
                width: 100%;
                max-width: 320px;
                padding: 22px 28px;
            }

            .hero-card .noms {
                font-size: 1.3rem;
            }

            .countdown {
                gap: 12px;
            }

            .countdown-item .number {
                font-size: 1.8rem;
            }

            .bienvenue-header .bienvenue-titre {
                font-size: 1.6rem;
            }

            .bienvenue-texte {
                font-size: 0.95rem;
                line-height: 1.7;
                text-align: left;
            }

            .bienvenue-encart {
                flex-direction: column;
                gap: 12px;
                padding: 22px 20px;
            }

            .bienvenue-encart-icone {
                text-align: center;
            }

            .bienvenue-encart-titre {
                text-align: center;
            }

            .bienvenue-encart-texte {
                text-align: left;
            }

            .programme-item {
                gap: 12px;
            }

            .programme-heure {
                font-size: 1rem;
                min-width: 55px;
            }

            .programme-titre {
                font-size: 1rem;
            }

            .programme-desc {
                font-size: 0.85rem;
            }

            .lieu-card {
                padding: 30px 25px;
            }

            .hebergement-grid {
                grid-template-columns: 1fr;
            }

            .hebergement-intro {
                font-size: 0.95rem;
                text-align: left;
            }

            .rsvp-box {
                padding: 35px 22px;
            }

            .rsvp-box .rsvp-titre {
                font-size: 1.4rem;
            }

            .infos-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ==========================================
         CONFETTIS (décoration de fond)
         ========================================== -->
    <div class="confetti-container" id="confetti-container"></div>

    <!-- ==========================================
         NAVIGATION
         ========================================== -->
    <nav>
        <ul>
            <li><a href="#programme">Programme</a></li>
            <li><a href="#lieu">Lieu</a></li>
            <li><a href="#hebergement">Hébergement</a></li>
            <li><a href="#rsvp">Confirmer</a></li>
            <li><a href="#infos">Infos</a></li>
        </ul>
    </nav>

    <!-- ==========================================
         HERO
         ========================================== -->
    <section id="hero">
        <h1 id="hero-titre"></h1>
        <p id="hero-roles"></p>
        <p id="hero-sous-titre"></p>

        <div class="hero-cards">
            <div class="hero-card voeux">
                <div class="icone">💍</div>
                <div class="label" id="card-voeux-label"></div>
                <div class="noms" id="card-voeux-noms"></div>
                <div class="detail" id="card-voeux-detail"></div>
            </div>
            <div class="hero-card anniv">
                <div class="icone">🎂</div>
                <div class="label" id="card-anniv-label"></div>
                <div class="noms" id="card-anniv-nom"></div>
                <div class="detail" id="card-anniv-detail"></div>
            </div>
        </div>

        <p id="hero-date-lieu"></p>

        <div class="countdown" id="countdown">
            <div class="countdown-item">
                <div class="number" id="cd-jours">--</div>
                <div class="unit">jours</div>
            </div>
            <div class="countdown-item">
                <div class="number" id="cd-heures">--</div>
                <div class="unit">heures</div>
            </div>
            <div class="countdown-item">
                <div class="number" id="cd-minutes">--</div>
                <div class="unit">minutes</div>
            </div>
            <div class="countdown-item">
                <div class="number" id="cd-secondes">--</div>
                <div class="unit">secondes</div>
            </div>
        </div>
    </section>

    <!-- ==========================================
         BIENVENUE / VENEZ COMME VOUS VOULEZ
         ========================================== -->
    <section id="bienvenue">
        <div class="bienvenue-wrapper">
            <div class="bienvenue-header">
                <div class="bienvenue-icone" id="bienvenue-icone"></div>
                <h2 class="bienvenue-titre" id="bienvenue-titre"></h2>
            </div>
            <p class="bienvenue-texte" id="bienvenue-texte"></p>
            <div class="bienvenue-encart">
                <div class="bienvenue-encart-icone" id="bienvenue-encart-icone"></div>
                <div class="bienvenue-encart-contenu">
                    <div class="bienvenue-encart-titre" id="bienvenue-encart-titre"></div>
                    <div class="bienvenue-encart-texte" id="bienvenue-encart-texte"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- ==========================================
         PROGRAMME
         ========================================== -->
    <section id="programme">
        <h2 class="section-title">Programme de la journée</h2>
        <div class="programme-legende">
            <div class="legende-item">
                <div class="legende-pastille voeux"></div>
                <span>Renouvellement des vœux</span>
            </div>
            <div class="legende-item">
                <div class="legende-pastille commun"></div>
                <span>Tous ensemble</span>
            </div>
        </div>
        <div class="programme-grid" id="programme-grid"></div>
    </section>

    <!-- ==========================================
         LIEU
         ========================================== -->
    <section id="lieu">
        <h2 class="section-title">Le lieu</h2>
        <div class="lieu-card">
            <div class="lieu-icone">📍</div>
            <h3 id="lieu-nom"></h3>
            <p id="lieu-adresse"></p>
            <p id="lieu-indication"></p>
            <a id="lieu-maps-link" class="btn-maps" href="#" target="_blank">Ouvrir dans Google Maps</a>
        </div>
    </section>

    <!-- ==========================================
         HÉBERGEMENT
         ========================================== -->
    <section id="hebergement">
        <h2 class="section-title">Hébergement</h2>
        <p class="hebergement-intro" id="hebergement-intro"></p>
        <div class="hebergement-grid" id="hebergement-grid"></div>
    </section>

    <!-- ==========================================
         RSVP / PRÉVENIR
         ========================================== -->
    <section id="rsvp">
        <div class="rsvp-box">
            <div class="rsvp-icone">📬</div>
            <div class="rsvp-titre" id="rsvp-titre"></div>
            <div class="rsvp-date-limite" id="rsvp-date-limite"></div>
            <div class="rsvp-texte" id="rsvp-texte"></div>
        </div>
    </section>

    <!-- ==========================================
         INFOS PRATIQUES
         ========================================== -->
    <section id="infos">
        <h2 class="section-title">Infos pratiques</h2>
        <div class="infos-grid" id="infos-grid"></div>
    </section>

    <!-- ==========================================
         FOOTER
         ========================================== -->
    <footer>
        <p id="footer-noms"></p>

        /* ==============================================
           COUNTDOWN (compte à rebours)
           ============================================== */
        function updateCountdown() {
            var now = new Date().getTime();
            var target = new Date(DATA.hero.dateEvenement).getTime();
            var diff = target - now;

            if (diff <= 0) {
                document.getElementById('cd-jours').textContent = "🎉";
                document.getElementById('cd-heures').textContent = "";
                document.getElementById('cd-minutes').textContent = "";
                document.getElementById('cd-secondes').textContent = "";
                return;
            }

            var jours = Math.floor(diff / (1000 * 60 * 60 * 24));
            var heures = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            var secondes = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('cd-jours').textContent = jours;
            document.getElementById('cd-heures').textContent = heures < 10 ? "0" + heures : heures;
            document.getElementById('cd-minutes').textContent = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById('cd-secondes').textContent = secondes < 10 ? "0" + secondes : secondes;
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);

        /* ==============================================
           CONFETTIS (animation décorative)
           ============================================== */
        var confettiColors = ['#C9A87C', '#E8B4C8', '#7EB8C9', '#B8D4A3', '#F0C987', '#D4A5C9'];
        var container = document.getElementById('confetti-container');

        for (var i = 0; i < 30; i++) {

            confetti.style.animationDuration = (Math.random() * 10 + 8) + 's';
            confetti.style.animationDelay = (Math.random() * 10) + 's';
            confetti.style.width = (Math.random() * 8 + 6) + 'px';
            confetti.style.height = confetti.style.width;
            container.appendChild(confetti);
        }
